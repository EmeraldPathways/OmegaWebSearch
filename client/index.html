<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Google Search</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>

  <!-- Search view -->
  <div id="view-search">
    <h1>Search</h1>
    <form class="search-form" id="search-form">
      <div class="search-inputs-list">
        <input type="text" id="q1" value="Alexander Lockley Grange Medical Practice Gp email address" autocomplete="off" />
        <input type="text" id="q2" value="Ali Alsaad Blackglen Medical Gp email address" autocomplete="off" />
        <input type="text" id="q3" value="Alicia Flynn The Surgery Gp email address" autocomplete="off" />
        <input type="text" id="q4" value="Alina Zidaru Millbrook Lawn Health Centre Gp email address" autocomplete="off" />
        <input type="text" id="q5" value="Alison Hampson 40 Whitethorn Rise Gp email address" autocomplete="off" />
      </div>
      <button type="submit" class="btn-search">Search All</button>
      <!-- Country: Ireland (IE), Language: English (EN) -->
    </form>
  </div>

  <!-- Results view -->
  <div id="view-results" class="hidden">
    <div class="results-header">
      <button type="button" class="btn-back" id="btn-back">← Back to Search</button>
    </div>
    <div id="results-container"></div>
  </div>

  <!-- Loading overlay -->
  <div id="loading-overlay" class="hidden">Searching...</div>

  <!-- Toast -->
  <div id="toast" class="hidden"></div>

  <script type="module" src="/js/views/search.js"></script>
  <script type="module" src="/js/views/results.js"></script>

</body>
</html>
