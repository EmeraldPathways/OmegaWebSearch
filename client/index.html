<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Google Search</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>

  <!-- Search view -->
  <div id="view-search">
    <h1>Search</h1>
    <form class="search-form" id="search-form">
      <label for="queries" class="queries-label">Paste up to 10 search queries (one per line):</label>
      <textarea id="queries" class="queries-textarea" rows="10" placeholder="Enter search queries, one per line...">Grace Conroy Ardara Family Practice GP Email Address
Graham Gordon Centric Health Newbridge GP Email Address
Grainne Ahern Knocknacarra Family Care GP Email Address
Grainne Ni Fhoghlu Strandside Medical GP Email Address
Grainne Pinaqui The Faythe Medical Centre GP Email Address
Gustavo Schmitt Es Doctors GP Email Address
Hana Maka Churchtown Family Practice GP Email Address
Hanna B Thomas De Sa Reilly Newport Health Centre GP Email Address
Hannah Mulholland Meadow Springs Medical Centre GP Email Address
Hans Weber 98 Monastery Road GP Email Address</textarea>
      <button type="submit" class="btn-search">Search All</button>
      <!-- Country: Ireland (IE), Language: English (EN) -->
    </form>
  </div>

  <!-- Results view -->
  <div id="view-results" class="hidden">
    <div class="results-header">
      <button type="button" class="btn-back" id="btn-back">← Back to Search</button>
    </div>
    <div id="results-container"></div>
  </div>

  <!-- Loading overlay -->
  <div id="loading-overlay" class="hidden">Searching...</div>

  <!-- Toast -->
  <div id="toast" class="hidden"></div>

  <script type="module" src="/js/views/search.js"></script>
  <script type="module" src="/js/views/results.js"></script>

</body>
</html>
